plugins {
    id "com.android.application"
}

android {
    namespace "com.signway.remotecontrol"
    compileSdk 34

    defaultConfig {
        applicationId "com.signway.remotecontrol"
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName "1.0.2"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
}
